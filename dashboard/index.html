<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalo Messaging Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .message-item { padding: 5px; border-bottom: 1px solid #eee; }
        .message-time { font-size: 0.8em; color: #666; }
        .qr-section { text-align: center; }
        .qr-image { max-width: 300px; margin: 10px auto; display: block; }
        .auth-status { font-weight: bold; margin-bottom: 10px; }
        .status-online { color: green; }
        .status-offline { color: red; }
    </style>
</head>
<body>
    <h1>Zalo Messaging Dashboard</h1>

    <div id="auth-info" class="section">
        <div id="status-text" class="auth-status">Checking connection...</div>
        <div id="qr-container" style="display: none;" class="qr-section">
            <h2>Zalo Login QR Code</h2>
            <p>Scan this QR code with your Zalo app to login.</p>
            <img id="qr-image" src="/qr.png" alt="Zalo Login QR Code" class="qr-image">
            <button onclick="location.reload()">Refresh</button>
        </div>
    </div>

    <div class="section">
        <h2>Send Message</h2>
        <div>
            <label for="group-select">To Group/User:</label>
            <select id="group-select"></select>
            <button onclick="loadGroups()">Refresh Groups</button>
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="thread-id" placeholder="Or enter Thread ID">
            <select id="type-select">
                <option value="user">User</option>
                <option value="group">Group</option>
            </select>
        </div>
        <div style="margin-top: 10px;">
            <textarea id="message-text" placeholder="Message content" style="width: 100%; height: 60px;"></textarea>
        </div>
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="section">
        <h2>Message History</h2>
        <button onclick="loadMessages()">Refresh Messages</button>
        <div id="messages-list"></div>
    </div>

    <script>
        async function checkAuthStatus() {
            try {
                const res = await fetch('/api/auth-status');
                const data = await res.json();
                const statusText = document.getElementById('status-text');
                const qrContainer = document.getElementById('qr-container');

                if (data.isAuthenticated) {
                    statusText.textContent = 'Status: ONLINE (Authenticated)';
                    statusText.className = 'auth-status status-online';
                    qrContainer.style.display = 'none';
                } else {
                    statusText.textContent = 'Status: OFFLINE (Scanning Required)';
                    statusText.className = 'auth-status status-offline';
                    qrContainer.style.display = 'block';
                    // Check if QR image exists
                    const img = document.getElementById('qr-image');
                    img.src = '/qr.png?' + new Date().getTime(); // Anti-cache
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadGroups() {
            try {
                const res = await fetch('/api/groups');
                if (!res.ok) throw new Error('Failed to load groups');
                const groups = await res.json();
                const select = document.getElementById('group-select');
                select.innerHTML = '<option value="">-- Select a group --</option>';
                groups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function sendMessage() {
            const text = document.getElementById('message-text').value;
            const threadId = document.getElementById('group-select').value || document.getElementById('thread-id').value;
            const type = document.getElementById('type-select').value;

            if (!text || !threadId) return alert('Please enter text and thread ID');

            const res = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, threadId, type })
            });
            const result = await res.json();
            console.log('Send result:', result);
            alert('Message sent!');
            document.getElementById('message-text').value = '';
        }

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                if (!res.ok) throw new Error('Failed to load messages');
                const messages = await res.json();
                const list = document.getElementById('messages-list');
                list.innerHTML = '';
                messages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'message-item';
                    div.innerHTML = `
                        <div><strong>${m.from || 'Unknown'}:</strong> ${m.text}</div>
                        <div class="message-time">${new Date(m.time).toLocaleString()}</div>
                    `;
                    list.prepend(div);
                });
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('group-select').addEventListener('change', (e) => {
            if (e.target.value) {
                document.getElementById('thread-id').value = e.target.value;
                document.getElementById('type-select').value = 'group';
            }
        });

        // Initial loads
        checkAuthStatus();
        loadGroups();
        loadMessages();

        setInterval(checkAuthStatus, 5000);
        setInterval(loadMessages, 5000);
    </script>
</body>
</html>
